name: Publish to npm

on:
  release:
    types: [published]

jobs:
  verify-and-publish:
    name: Verify & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: node --check xhtmlx.js
      - run: npx eslint xhtmlx.js tests/ --ext .js
      - run: npx jest --verbose --forceExit
      - run: npx terser xhtmlx.js -o xhtmlx.min.js --compress --mangle --source-map "filename='xhtmlx.min.js.map',url='xhtmlx.min.js.map'"
      - run: npm pack --dry-run
      - name: Publish with OIDC provenance
        run: npm publish --provenance --access public
