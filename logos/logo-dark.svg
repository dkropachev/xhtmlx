<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180">
  <defs>
    <linearGradient id="gf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Icon -->
  <rect x="10" y="10" width="160" height="160" rx="34" fill="url(#gf)"/>
  <g transform="translate(90, 90)">
    <!-- Top V (angle brackets < >) -->
    <path d="M-35,-38 L0,-8 L35,-38" stroke="white" stroke-width="11" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bottom V (curly braces {{ }}) -->
    <path d="M-35,38 L0,8 L35,38" stroke="white" stroke-width="11" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Center binding dot -->
    <circle cx="0" cy="0" r="5.5" fill="white"/>
  </g>
  <!-- Wordmark -->
  <text x="195" y="126" font-family="Inter, system-ui, sans-serif" font-size="90" font-weight="800" fill="url(#gf)">x</text>
  <text x="260" y="126" font-family="Inter, system-ui, sans-serif" font-size="90" font-weight="300" fill="#e2e8f0">html</text>
  <text x="530" y="126" font-family="Inter, system-ui, sans-serif" font-size="90" font-weight="800" fill="url(#gf)">x</text>
</svg>
